<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Expense Tracker Pro — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--card:#FDFAF4;--accent:#2D6A4F;--accent2:#E07A5F;
  --text:#1C2B20;--text2:#6B7A6E;--border:rgba(0,0,0,0.09);
  --red:#C0392B;--green:#2D9E6B;
  --shadow:0 8px 40px rgba(0,0,0,0.10);
}
body{
  font-family:'Outfit',sans-serif;min-height:100vh;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  padding:20px;
  background-image: radial-gradient(circle at 20% 20%, rgba(45,106,79,0.08) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(224,122,95,0.08) 0%, transparent 50%);
}
.wrap{width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:32px}
.brand-icon{font-size:48px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.brand h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent)}
.brand p{color:var(--text2);font-size:14px;margin-top:4px}
.card{
  background:var(--card);border-radius:20px;padding:36px;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;gap:0}
.tab-btn{
  flex:1;padding:10px;background:none;border:none;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}.tab-panel.active{display:block}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input{
  width:100%;padding:12px 14px;border-radius:10px;
  background:var(--bg);color:var(--text);
  border:1.5px solid var(--border);outline:none;
  font-size:15px;font-family:inherit;
  transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .2s;margin-top:4px;
  background:var(--accent);color:#fff;
  box-shadow:0 4px 16px rgba(45,106,79,.25);
}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 24px rgba(45,106,79,.3)}
.btn:active{transform:none}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error-msg{
  background:rgba(192,57,43,.1);color:var(--red);
  border:1px solid rgba(192,57,43,.2);border-radius:8px;
  padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;
}
.success-msg{
  background:rgba(45,158,107,.1);color:var(--green);
  border:1px solid rgba(45,158,107,.2);border-radius:8px;
  padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;
}
.divider{text-align:center;color:var(--text2);font-size:12px;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.hint{font-size:12px;color:var(--text2);text-align:center;margin-top:20px;line-height:1.6}
.hint strong{color:var(--accent)}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="brand-icon">💸</span>
    <h1>Expense Tracker Pro</h1>
    <p>Your personal finance companion</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-panel active" id="panel-login">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="your username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" onclick="doLogin()" id="login-btn">Sign In</button>
    </div>

    <!-- REGISTER -->
    <div class="tab-panel" id="panel-register">
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="reg-display" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-user" placeholder="choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password <span style="font-weight:400;text-transform:none;letter-spacing:0">(min 6 chars)</span></label>
        <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password"
               onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn" onclick="doRegister()" id="reg-btn">Create Account</button>
    </div>

    <div class="divider">or</div>
    <div class="hint">
      {% if not has_users %}
      <strong>First time?</strong> Create an account to get started.<br>All your data stays on your computer.
      {% else %}
      Data stored locally on your computer 🔒
      {% endif %}
    </div>
  </div>
</div>
<script>
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===t));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}
function hideErr(id) { document.getElementById(id).style.display = 'none'; }

async function doLogin() {
  hideErr('login-error');
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username||!password) { showErr('login-error','Please fill in all fields'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})});
  const d = await res.json();
  if (d.ok) { window.location = d.redirect; }
  else { showErr('login-error', d.error); btn.disabled=false; btn.textContent='Sign In'; }
}

async function doRegister() {
  hideErr('reg-error');
  const display  = document.getElementById('reg-display').value.trim();
  const username = document.getElementById('reg-user').value.trim();
  const password = document.getElementById('reg-pass').value;
  if (!username||!password) { showErr('reg-error','Please fill in all fields'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled=true; btn.textContent='Creating account…';
  const res = await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password,display})});
  const d = await res.json();
  if (d.ok) { window.location = d.redirect; }
  else { showErr('reg-error', d.error); btn.disabled=false; btn.textContent='Create Account'; }
}
</script>
</body>
</html>
